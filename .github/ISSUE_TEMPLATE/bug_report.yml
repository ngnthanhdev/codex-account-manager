name: Bug report
description: Report a problem with Codex Account Manager.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste tokens, cookies, `auth.json`, or profile data.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Capture profile ...
        2. Switch to ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "Example: macOS Tahoe 26.2"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version or commit
      placeholder: "Example: main / commit hash"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove secrets before posting.
      render: text
