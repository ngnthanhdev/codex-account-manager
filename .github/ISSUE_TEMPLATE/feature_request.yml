name: Feature request
description: Suggest an improvement for Codex Account Manager.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the app do?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add screenshots, examples, or alternatives if useful. Do not include secrets.
