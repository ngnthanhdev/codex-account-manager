name: Release macOS App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.3.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Validate Shell Script
        run: bash -n codex-account-switcher.sh

      - name: Build App
        run: |
          chmod +x build-app.sh codex-account-switcher.sh
          ./build-app.sh

      - name: Package App
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Codex Account Switcher.app" \
            "dist/Codex Account Switcher.app.zip"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex Account Switcher
          path: dist/Codex Account Switcher.app.zip
          if-no-files-found: error

      - name: Resolve Release Tag
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            printf 'tag=%s\n' "${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            printf 'tag=%s\n' "$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/Codex Account Switcher.app.zip
